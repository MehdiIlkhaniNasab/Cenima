<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/home/header.css">
    <link rel="stylesheet" href="css/home/main.css">
    <link rel="stylesheet" href="css/home/slideshow.css">
    <link rel="stylesheet" href="css/home/Featured.css">
    <link rel="stylesheet" href="css/home/populares.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <img class="header-left-img" src="images/Group3.png" alt="">
            </div>
            <div class="header-center">
                <input type="search" placeholder="Encontre seus filmes favoritos…" class="search-text"><i class="fa fa-search icon-search"></i>
            </div>
            <div class="header-right">
                <i class="fa fa-plus plus"></i>
                <i class="fas fa-bell bell"></i>
                <img class="header-image-right" src="images/avatar.png" alt="">
                <span class="text-username">Thomas Jackson</span>
                <i class="fas fa-angle-down arrow"></i>
            </div>
        </header>
        <div class="slideshow">
            <div class="slideshow-content">
                <p class="slideshow-deetails">DESTAQUES</p>
                <h1 class="slideshow-tittle">John Wick: <br>Chapter     3 – Parabellum</h1>
                <p class="slideshow-time">Ação | Suspense - 2h 12min</p>
                <div class="slideshow-content-bottom__text">
                    <img class="img-play" src="images/PLAY.png" alt="">
                    <p class="slide-show-play">Veja o trailer</p>
                </div>
            </div>
        </div>
        <div class="populares">
            <div class="top-populares">
                <p class="text-populares">Os mais populares</p>
                <div class="arrow">
                    <i class="fa fa-angle-left"></i>
                    <i class="fa fa-angle-right"></i>
                </div>
            </div>
            <div class="bottom-populares">
                <img src="images/pop1.png" alt="" class="img-populares">
                <img src="images/pop2.png" alt="" class="img-populares">
                <img src="images/pop3.png" alt="" class="img-populares">
                <img src="images/pop4.png" alt="" class="img-populares">
                <img src="images/pop5.png" alt="" class="img-populares">
                <img src="images/pop6.png" alt="" class="img-populares">
            </div>
        </div>
        <div class="featured">
            <div class="top-featured">
                <p class="text-featured">Coleções em destaque</p>
                <div class="arrow">
                    <i class="fa fa-angle-left"></i>
                    <i class="fa fa-angle-right"></i>
                </div>
            </div>
            <div class="bottom-featured">
                <img src="images/feature1.png" alt="" class="img-featured">
                <img src="images/feature2.png" alt="" class="img-featured">
                <img src="images/feature3.png" alt="" class="img-featured">
                <img src="images/feature4.png" alt="" class="img-featured">
                <img src="images/feature5.png" alt="" class="img-featured">
                <img src="images/feature6.png" alt="" class="img-featured">
            </div>
        </div>
    </div>
</body>
</html>
